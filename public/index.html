<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hitster</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════ SETUP SCREEN -->
  <div id="screen-setup" class="screen active">
    <header class="setup-header">
      <div class="setup-header-left">
        <div class="logo">🎵 Hitster</div>
        <p class="tagline">Timeline song guessing game</p>
      </div>
      <div id="profile-btn-wrap" class="profile-btn-wrap"></div>
    </header>

    <main class="setup-main">
      <!-- Teams section -->
      <section class="setup-section">
        <h2>Teams</h2>
        <div id="team-inputs"></div>
        <button id="btn-add-team" class="btn-ghost">+ Add team</button>
      </section>

      <!-- Cards to win -->
      <section class="setup-section">
        <h2>Cards to Win</h2>
        <div class="cards-to-win-row">
          <button class="btn-ghost btn-num" id="btn-cards-minus">−</button>
          <span id="cards-to-win-display" class="cards-num">8</span>
          <button class="btn-ghost btn-num" id="btn-cards-plus">+</button>
        </div>
      </section>

      <!-- Playlist selector -->
      <section class="setup-section">
        <h2>Playlist</h2>
        <div class="playlist-tabs">
          <button class="playlist-tab active" id="tab-my">My Hitster Playlists</button>
          <button class="playlist-tab" id="tab-all">All Playlists</button>
          <button class="playlist-tab" id="tab-official">Official Hitster</button>
        </div>
        <div id="playlist-filter-wrap" class="playlist-filter-wrap hidden">
          <input id="playlist-filter" class="playlist-filter" type="text" placeholder="Filter by name…" autocomplete="off" spellcheck="false">
        </div>
        <div class="playlist-row">
          <select id="playlist-select">
            <option value="">Loading playlists…</option>
          </select>
          <button id="btn-refresh-playlists" class="btn-ghost btn-icon" title="Refresh">↻</button>
        </div>
        <p id="playlist-info" class="playlist-info"></p>
      </section>

      <!-- Hard mode settings -->
      <section class="setup-section">
        <h2>Game Mode</h2>
        <label class="toggle-row">
          <span class="toggle-switch-wrap">
            <input type="checkbox" id="toggle-hard-final" class="toggle-check">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </span>
          <div class="toggle-info">
            <span class="toggle-name">Hard mode — last card</span>
            <span class="toggle-desc">Must name title &amp; artist when one card away from winning</span>
          </div>
        </label>
        <label class="toggle-row">
          <span class="toggle-switch-wrap">
            <input type="checkbox" id="toggle-hard-all" class="toggle-check">
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </span>
          <div class="toggle-info">
            <span class="toggle-name">Hard mode — all turns</span>
            <span class="toggle-desc">Must name title &amp; artist on every placement</span>
          </div>
        </label>
      </section>

      <!-- Start -->
      <button id="btn-start-game" class="btn-primary btn-large" disabled>Start Game</button>
      <p id="setup-error" class="error-msg"></p>
    </main>
  </div>

  <!-- ══════════════════════════════════════ OAUTH REQUIRED OVERLAY -->
  <div id="oauth-overlay" class="oauth-overlay hidden">
    <div class="oauth-overlay-card">
      <div class="oauth-overlay-icon">🎵</div>
      <h2 class="oauth-overlay-title">Spotify Login Required</h2>
      <p id="oauth-overlay-msg" class="oauth-overlay-msg"></p>
      <a id="oauth-overlay-login" href="/auth/login" class="btn-oauth-login hidden">Login with Spotify</a>
      <button id="oauth-overlay-retry" class="btn-oauth-retry">Retry</button>
    </div>
  </div>

  <!-- ══════════════════════════════════════ AUTH PANEL (localhost only) -->
  <div id="auth-panel" class="auth-panel hidden">
    <div class="auth-panel-inner">
      <span id="auth-mode-label" class="auth-mode-label"></span>
      <span id="auth-display-name" class="auth-display-name"></span>
      <div id="auth-actions" class="auth-actions"></div>
    </div>
  </div>

  <script src="common.js"></script>
  <script src="app.js"></script>
</body>
</html>
